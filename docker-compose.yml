services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: reliqueue
      POSTGRES_USER: reliqueue
      POSTGRES_PASSWORD: reliqueue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliqueue"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn reliqueue.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://reliqueue:reliqueue@postgres:5432/reliqueue
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: .
    command: python -m reliqueue.worker
    environment:
      DATABASE_URL: postgresql://reliqueue:reliqueue@postgres:5432/reliqueue
      WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
