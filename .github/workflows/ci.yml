name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: reliqueue
          POSTGRES_USER: reliqueue
          POSTGRES_PASSWORD: reliqueue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reliqueue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://reliqueue:reliqueue@localhost:5432/reliqueue
        run: pytest -q
